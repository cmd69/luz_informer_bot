# Luz Informer Bot - Desarrollo (hot reload)
# make up-dev / make down-dev
# Monta código y usa watchmedo para reiniciar al cambiar *.py

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: luz_informer_bot-dev
    volumes:
      - ./config:/app/config:ro
      - ./src:/app/src
      - ./scripts:/app/scripts:ro
      - ./data:/data
    command: watchmedo auto-restart -d /app -p "*.py" --recursive -- python -m src.main
