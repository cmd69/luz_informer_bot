# Luz Informer Bot - Producción
# make up / make down

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: luz-informer-bot
    env_file: .env
    environment:
      - DB_PATH=/data/precio_luz.db
    volumes:
      - ./data:/data
    restart: unless-stopped
